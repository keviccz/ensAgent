name: ensagent  # main env for: scoring + annotation + ensagent_agent + api
channels:
  - conda-forge
  # Only conda-forge (no defaults) to avoid OOM when solving with many channels
dependencies:
  - python=3.10
  - pip
  # Core scientific stack (minimal conda packages to speed up solving)
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - requests
  - tqdm
  - sqlalchemy
  - jinja2
  - typing-extensions
  - python-dotenv
  - pillow
  # Web app/runtime support
  - plotly
  - pip:
      # Single Python dependency source (root file)
      - -r requirements.txt
